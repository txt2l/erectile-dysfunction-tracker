name: AI-Proof Build Validation

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: node diagnose.js --ci --strict

      - run: |
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            echo "Missing lockfile"; exit 1
          fi

  build-client-app:
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: |
          npm install --legacy-peer-deps
          cd client && npm install --legacy-peer-deps || true

      - run: cd client && npm run build

  build-server-app:
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: |
          npm install --legacy-peer-deps
          cd server && npm install --legacy-peer-deps || true

      - run: cd server && npx tsc --noEmit || true
      - run: npx tsup || npm run build

  docker-build-final:
    runs-on: ubuntu-latest
    needs: [build-client-app, build-server-app]

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - run: docker build -t app-test:${{ github.sha }} .

      - run: docker run --rm app-test:${{ github.sha }} node --version

  railway-check-final:
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - uses: actions/checkout@v4

      - run: |
          if [ ! -f railway.json ]; then
            echo "Missing railway.json"; exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('railway.json'))"

      - run: |
          if [ ! -f .env.example ]; then
            echo "Missing .env.example"; exit 1
          fi
