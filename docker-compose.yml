services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ed_tracker
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:root_password@db:3306/ed_tracker
      - NODE_ENV=development
      - VITE_APP_ID=erectile-dysfunction-tracker
      - VITE_OAUTH_PORTAL_URL=https://manus.im
    depends_on:
      db:
        condition: service_healthy
