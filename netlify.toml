# Netlify Configuration for ChatroomLM
# Replace YOUR-BACKEND-URL with your actual Snap Deploy backend URL

[build]
  command = "pnpm install && pnpm run build"
  publish = "client/dist"

# Redirect API calls to backend
[[redirects]]
  from = "/api/socket.io/*"
  to = "https://YOUR-BACKEND-URL/api/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND-URL/api/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
