nixVersion = 'latest'
nixpkgsArchive = 'github:NixOS/nixpkgs/ffeebf0acf3ae8b29f8c7049cd911b9636efd7e7'
providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_22', 'pnpm_9', 'caddy', 'openssl']

[phases.install]
cmds = ['pnpm install']

[phases.build]
cmds = ['npm install && npm run build']

[phases.start]
cmd = 'node dist/server.js'
